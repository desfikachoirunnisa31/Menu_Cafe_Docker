services:
  app:
    build: .
    container_name: menu_cafe_app
    ports:
      - "8081:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=cafe_db
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: menu_cafe_db
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      # MYSQL_DATABASE sengaja TIDAK diisi karena db.sql kamu
      # sudah berisi perintah CREATE DATABASE cafe_db sendiri.
      # Kalau diisi di sini, akan terjadi konflik "database already exists".
    #ports:
      #- "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db.sql:/docker-entrypoint-initdb.d/db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  db_data: